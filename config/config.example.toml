# Masix Configuration Example
#
# Run 'masix config init' for interactive setup wizard
# The wizard will help you configure providers and models

[core]
data_dir = "~/.masix"
log_level = "info"

[core.agent_loop]
auto_continue_enabled = true
auto_continue_max = 3
continuation_detection = "heuristic_v1" # or "strict_v1"
# max_tool_iterations = 25

[core.tool_progress]
enabled = true
mode = "first_round" # first_round | periodic | milestones
interval_secs = 8
max_updates = 5
include_tool_names = true

[core.streaming]
enabled = false
mode = "off" # off | telegram_draft | telegram_chunked
flush_interval_ms = 900
max_message_edits = 20
finalize_timeout_secs = 10

[core.cron]
dispatch_concurrency = 2
delivery_retry_count = 2
delivery_retry_backoff_secs = 10
dead_letter_enabled = true

[updates]
enabled = true
check_on_start = true
auto_apply = true
restart_after_update = true
channel = "latest"

[telegram]
poll_timeout_secs = 60

[[telegram.accounts]]
bot_token = "YOUR_BOT_TOKEN_HERE"
admins = []
users = []
readonly = []
group_mode = "all"
auto_register_users = true
notify_admin_on_new_user = true
# new_user_welcome_message = "Welcome! I'm online."
user_tools_mode = "none"
# user_allowed_tools = ["web_fetch", "plugin_discovery_web_search", "read_file"]
user_allowed_tools = []

# Optional modules are installed later via `masix plugin ...` / wizard plugin step.

[stt]
enabled = false
engine = "local_whisper_cpp"
# local_model_path = "~/.masix/models/whisper/whisper_base.bin"
# local_bin = "whisper-cli"
# local_threads = 2
# local_language = "it"

[mcp]
enabled = true

[[mcp.servers]]
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/data/data/com.termux/files/home"]
timeout_secs = 30
startup_timeout_secs = 20
healthcheck_interval_secs = 60

[[mcp.servers]]
name = "memory"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
timeout_secs = 30
startup_timeout_secs = 20
healthcheck_interval_secs = 60

# Example: long-running MCP server (codex tools) with extended timeout
# [[mcp.servers]]
# name = "plugin_codex_tools"
# command = "/path/to/codex-tools"
# args = ["serve-mcp"]
# env = { CODEX_TIMEOUT_SECS = "1800" }
# timeout_secs = 1800  # Match internal plugin timeout (default: 30)
# startup_timeout_secs = 30
# healthcheck_interval_secs = 120

# Providers will be configured by 'masix config init' wizard
[providers]
default_provider = ""

# Bot profiles (optional)
# [bots]
# [[bots.profiles]]
# name = "default"
# workdir = "~/.masix"
# memory_file = "~/.masix/MEMORY.md"
# provider_primary = ""
# vision_provider = "" # optional dedicated provider for media analysis
# provider_fallback = []

# Command execution
[exec]
enabled = true
allow_base = true
allow_termux = true

[policy]
rate_limit = { messages_per_minute = 60 }
