# Masix Configuration Example
#
# Run 'masix config init' for interactive setup wizard
# The wizard will help you configure providers and models

[core]
data_dir = "~/.masix"
log_level = "info"

[telegram]
poll_timeout_secs = 60

[[telegram.accounts]]
bot_token = "YOUR_BOT_TOKEN_HERE"

[whatsapp]
enabled = false
read_only = true
# transport_path = "crates/masix-whatsapp/whatsapp-transport.js"
# ingress_shared_secret = "CHANGE_ME"
# allowed_senders = ["393471443005@c.us"]
# max_message_chars = 4000
# forward_to_telegram_chat_id = 111111111
# forward_to_telegram_account_tag = "123456789"
# forward_prefix = "WhatsApp Alert"

[sms]
enabled = true
# watch_interval_secs = 30
# forward_to_telegram_chat_id = 111111111
# forward_to_telegram_account_tag = "123456789"
# forward_prefix = "SMS Alert"

[mcp]
enabled = true

[[mcp.servers]]
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/data/data/com.termux/files/home"]

[[mcp.servers]]
name = "memory"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

# Providers will be configured by 'masix config init' wizard
[providers]
default_provider = ""

# Bot profiles (optional)
# [bots]
# [[bots.profiles]]
# name = "default"
# workdir = "~/.masix"
# memory_file = "~/.masix/MEMORY.md"
# provider_primary = ""
# vision_provider = "" # optional dedicated provider for media analysis
# provider_fallback = []

# Command execution
[exec]
enabled = true
allow_base = true
allow_termux = true

[policy]
rate_limit = { messages_per_minute = 60 }
